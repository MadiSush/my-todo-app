<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>📝 My To-Do List</h1>
    <div class="counter">
      <span id="totalCount">0</span> tasks &nbsp;|&nbsp;
      <span id="doneCount">0</span> done &nbsp;|&nbsp;
      <span id="leftCount">0</span> remaining
    </div>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task..." />
      <button onclick="addTask()">Add</button>
    </div>
    <ul id="taskList"></ul>
    <p id="empty" class="empty">No tasks yet. Add one above!</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
